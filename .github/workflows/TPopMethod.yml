name: Cloud PC + Web Browser Link + Opera GX (UltraVNC Stable)

on:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 190
    env:
      RUNTIME_MINUTES: 180

    steps:
      - name: Wipe Unnecessary Pre-Installed GitHub Apps & Shortcuts
        run: |
          $publicDesktop = [Environment]::GetFolderPath("CommonDesktopDirectory")
          $targets = @("Unity Hub.lnk", "R 4.6.0.lnk", "Firefox.lnk", "Google Chrome.lnk", "Claim Rewards Here.lnk")
          foreach ($target in $targets) { Remove-Item "$publicDesktop\$target" -Force -ErrorAction SilentlyContinue }

      - name: Force Full HD Resolution
        run: Set-DisplayResolution -Width 1920 -Height 1080 -Force

      - name: Install and Configure UltraVNC (Zero Prompts Passwordless)
        run: |
          # Download the stable UltraVNC setup engine
          Invoke-WebRequest -Uri "https://support.uvnc.com/download/1436/UltraVNC_1_4_36_X64_Setup.exe" -OutFile "$env:TEMP\ultravnc.exe"
          
          # Install silently without registering confusing system loops
          Start-Process "$env:TEMP\ultravnc.exe" -ArgumentList "/verysilent", "/norestart", "/loadinf=`"setup.inf`"" -Wait
          
          Start-Sleep -Seconds 5
          
          # Target the configuration layout directory
          $uvncPath = "C:\Program Files\uvnc bvba\UltraVNC"
          Ensure-Toggle-Directory -Path $uvncPath
          
          # Create a bulletproof text configuration that forces absolute open access
          $iniContent = @"
          [UltraVNC]
          AuthRequired=0
          AuthType=0
          AllowLoopback=1
          LoopbackOnly=0
          AcceptLocalConnections=1
          QuerySetting=2
          Primary=1
          Secondary=0
          PortNumber=5900
          "@
          
          # Save config cleanly to bypass Windows Registry locks
          Set-Content -Path "$uvncPath\ultravnc.ini" -Value $iniContent -Force
          
          # Run the engine cleanly as an immediate background job instance
          Start-Process "$uvncPath\winvnc.exe" -ArgumentList "-run"

      - name: Download & Force Consumer Build of Opera GX
        run: |
          Invoke-WebRequest -Uri "https://net.geo.opera.com/opera_gx/stable/windows?utm_source=inf&utm_medium=gx" -OutFile "$env:TEMP\OperaGXSetup.exe"
          Start-Process -FilePath "$env:TEMP\OperaGXSetup.exe" -ArgumentList "--silent=1", "--allusers=1", "--launchbrowser=0" -Wait

      - name: Deploy Web Interface & Dynamic Gateway Engines
        run: |
          pip install websockify --quiet
          npm install -g localtunnel --silent
          New-Item -ItemType Directory -Path "C:\noVNC" -Force
          Invoke-WebRequest -Uri "https://github.com/novnc/noVNC/archive/refs/tags/v1.5.0.zip" -OutFile "novnc.zip"
          Expand-Archive -Path "novnc.zip" -DestinationPath "C:\noVNC" -Force
          Copy-Item -Path "C:\noVNC\noVNC-1.5.0\*" -Destination "C:\noVNC" -Recurse -Force

      - name: Start Services & Generate Unique Instant URLs
        run: |
          Write-Host "Launching Native Python Web Bridge..."
          Start-Process python -ArgumentList "-m websockify 8080 localhost:5900 --web C:\noVNC"
          
          Write-Host "Verifying local backend initialization..."
          $retries = 0
          while (-not (Test-NetConnection -ComputerName 127.0.0.1 -Port 8080).TcpTestSucceeded -and $retries -lt 15) {
              Start-Sleep -Seconds 2
              $retries++
          }
          
          Write-Host "Requesting isolated, non-clashing edge domain map..."
          $LogFile = "$env:TEMP\localtunnel.log"
          Start-Process cmd.exe -ArgumentList "/c lt --port 8080 > `"$LogFile`""
          Start-Sleep -Seconds 7
          
          $RawLink = (Get-Content $LogFile -Raw) | Select-String -Pattern 'https://[a-zA-Z0-9-]+\.loca\.lt' | Select-Object -ExpandProperty Matches | Select-Object -ExpandProperty Value -First 1
          
          if ($RawLink) {
              $FinalUrl = $RawLink + "/vnc.html"
              Write-Host "===================================================="
              Write-Host "      WEB-BROWSER CLOUD PC IS READY TO CONNECT      "
              Write-Host "===================================================="
              Write-Host " CLICK LINK: $FinalUrl"
              Write-Host " SECURITY  : Password disabled. Click 'Connect' to open."
              Write-Host "===================================================="
          } else {
              Write-Error "CRITICAL: Dynamic gateway assignment timed out."
          }

      - name: Keep alive
        run: Start-Sleep -Seconds 10000
